<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Érica Torres - Portfólio</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">Érica Torres</h1>
            <nav class="nav">
                <a href="#projects" class="nav-link">Projetos</a>
                <a href="#contact" class="nav-link">Contato</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="subtitle-bar">
            <div class="container">
                <p class="subtitle-text">Estudante de Arquitetura e Urbanismo</p>
            </div>
        </section>

        <section id="projects" class="projects">
            <div class="container">
                <div class="projects-grid" id="projectsGrid">
                    <!-- Projetos serão inseridos via JavaScript -->
                </div>
            </div>
        </section>

        <section id="contact" class="contact">
            <div class="container">
                <h2 class="section-title">Contato</h2>
                <div class="contact-info">
                    <a href="mailto:contato@ericatorres.com" class="contact-link">contato@ericatorres.com</a>
                    <a href="https://instagram.com" class="contact-link" target="_blank">Instagram</a>
                    <a href="https://behance.net" class="contact-link" target="_blank">Behance</a>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p class="footer-text">© 2026 Érica Torres. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
